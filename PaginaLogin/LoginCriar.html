<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta de Login</title>
</head>
<body>
   <h2>Crie sua conta aqui!</h2> 
   <form action="/LoginCriar.html" method="post">
     <div>
        <label for="email">E-mail:</label>
        <input type="email" id="e-mail" name="email" required>
     </div>
     <br>
     <div>
        <label for="username">Nome completo:</label>
        <input type="username" id="username" name="username" required>
     </div>
     <br>
     <div>
        <label for="password">Criar senha:</label>
        <input type="password" id="password" name="password" required>
        
     </div>
     <br>
     <div>
         <button type="submit">Criar Conta</button>
     </div>
   </form>
   <br>
    <p>Já tem conta? <a href="/PaginaLogin/index.html">Faça Login
</body>
</html>
